version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cddas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cddas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cddas_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: cddas_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-cddas_secure_password}@postgres:5432/cddas_db
      PORT: 4000
    env_file:
      - .env
    volumes:
      - api_uploads:/app/uploads
      - api_logs:/app/logs
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Web ────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: cddas_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:4000
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ── NGINX ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cddas_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  api_uploads:
  api_logs:
  nginx_logs:
